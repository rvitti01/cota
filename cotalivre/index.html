<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cota de Presente</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.convite {
    width: 100%;
    max-width: 420px;
    aspect-ratio: 9/16;
    background: url("cota.png") center center / cover no-repeat;
    position: relative;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.botao-area {
    position: absolute;
    bottom: 13%;
    width: 100%;
    text-align: center;
    padding: 0 20px;
}

button {
    background: #8b5e5e;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s ease;
}

button:hover {
    background: #6f4747;
}

.msg {
    margin-top: 10px;
    color: #333;
    font-size: 14px;
}

/* Responsividade para telas pequenas */
@media (max-width: 480px) {
    body {
        padding: 10px;
    }

    .convite {
        width: 100%;
        max-width: 100%;
    }

    button {
        padding: 14px 30px;
        font-size: 16px;
        width: 90%;
        max-width: 300px;
    }

    .msg {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<div class="convite">

<div class="botao-area">
<button onclick="copiarPix()">📋 Copiar código PIX</button>
<div class="msg" id="msg"></div>
</div>

</div>

<script>

function copiarPix(){

const pix = "00020126560014BR.GOV.BCB.PIX0111394171398190219Cota Presente - R&B5204000053039865802BR5925RODRIGO DEGLI ESPOSTI VIT6009RIO CLARO62250521IW0Shu9e7yF5yCLJmEMOt63042D32";

navigator.clipboard.writeText(pix).then(()=>{
document.getElementById("msg").innerHTML = "✅ Código PIX copiado!";
setTimeout(()=>{
    document.getElementById("msg").innerHTML = "";
}, 3000);
});

}

</script>

</body>
</html>
